version: '3.8'
services:
  web:
    build: .
    ports:
      - "8000:8000"
      - "8888:8888"  # 新增 Streamlit 的連接埠
    volumes:
      - .:/src
    # 修改啟動指令，讓兩個服務同時跑
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
             streamlit run admin_ui.py --server.port 8888 --server.address 0.0.0.0"
    restart: always